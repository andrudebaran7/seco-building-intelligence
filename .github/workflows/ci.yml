name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Los tests cubren las funciones puras del pipeline y no necesitan
      # las dependencias pesadas (torch/sentence-transformers).
      - run: pip install pytest ruff
      - run: ruff check .
      - run: pytest -q
