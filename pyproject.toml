[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E/F: pycodestyle + pyflakes; I: orden de imports; B: bugbear; UP: modernización
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # líneas largas: las URLs y tablas de docs las superan a propósito
    "E731",  # lambdas asignadas (pct = lambda...): estilo compacto deliberado
]
